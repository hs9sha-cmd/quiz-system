name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Path to deploy to on the FTP server (e.g., public_html/ or /)
          # server-dir: public_html/
          # Exclude git files and database config to prevent overwriting production credentials
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            config/db.php
