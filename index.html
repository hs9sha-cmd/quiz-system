<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech with M - ระบบสอบออนไลน์</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero {
            text-align: center;
            padding: 8rem 2rem 5rem;
        }
        .hero h1 {
            font-size: 4.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .hero p {
            font-size: 1.5rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 3rem;
            letter-spacing: -0.01em;
        }
        .login-card {
            max-width: 400px;
            margin: 0 auto;
        }
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .hero p { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <main>
        <div class="hero">
            <h1>Tech with M.</h1>
            <p>ระบบการเรียนรู้และการสอบที่เหนือกว่า</p>
            
            <div class="glass-card login-card">
                <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem;">เข้าสู่ระบบ</h3>
                
                <div id="alert-container"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <input type="text" id="username" placeholder="รหัสประจำตัวนักเรียน" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <input type="password" id="password" placeholder="รหัสผ่าน" required>
                    </div>
                    <button type="submit" class="btn btn-primary">ลงชื่อเข้าใช้</button>
                </form>
            </div>
        </div>
    </main>
    
    <footer class="custom-footer">
        HS9SHA - Wednesday By M&M Service<br>
        <span>081-738-1914</span>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await apiCall('auth.php', { action: 'login', username, password });
            
            if (res.success) {
                if (res.require_password_change) {
                    window.location.href = 'change_password.html';
                } else {
                    if (res.role === 'teacher') {
                        window.location.href = 'admin/dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }
            } else {
                showAlert(res.message);
            }
        });
        
        async function checkAuth() {
            const res = await apiCall('auth.php', { action: 'me' });
            if (res.authenticated) {
                if (res.user.role === 'teacher') {
                    window.location.href = 'admin/dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
