<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปลี่ยนรหัสผ่าน - Quiz System</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main style="justify-content: center; align-items: center;">
        <div class="glass-card" style="width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 1rem; color: var(--accent-pink);">กรุณาตั้งรหัสผ่านใหม่</h2>
            <p style="text-align: center; margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
                สำหรับการเข้าใช้งานครั้งแรก คุณต้องเปลี่ยนรหัสผ่านเพื่อความปลอดภัย
            </p>
            <div id="alert-container"></div>
            
            <form id="password-form">
                <input type="hidden" name="action" value="change_password">
                <div class="form-group">
                    <label>รหัสผ่านใหม่</label>
                    <input type="password" name="new_password" required minlength="4">
                </div>
                <div class="form-group">
                    <label>ยืนยันรหัสผ่านใหม่</label>
                    <input type="password" name="confirm_password" required minlength="4">
                </div>
                <button type="submit" class="btn btn-primary">บันทึกรหัสผ่าน</button>
            </form>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            if (data.new_password !== data.confirm_password) {
                showAlert('รหัสผ่านทั้งสองช่องไม่ตรงกัน');
                return;
            }
            
            const res = await apiCall('auth.php', data);
            
            if (res.success) {
                showAlert('เปลี่ยนรหัสผ่านสำเร็จ กำลังพาดำเนินการต่อ...', 'success');
                setTimeout(() => {
                    window.location.href = res.redirect;
                }, 1500);
            } else {
                showAlert(res.message);
            }
        });
    </script>
</body>
</html>
